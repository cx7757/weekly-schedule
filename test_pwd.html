<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    button { padding: 12px 20px; border: none; border-radius: 8px; background: #6c5ce7; color: white; font-size: 16px; cursor: pointer; margin: 5px; }
    input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 200px; margin: 5px; }
    .danger { background: #d63031; }
    .success { background: #00b894; }
  </style>
</head>
<body>
  <h1>🔐 密码系统测试</h1>
  
  <div class="card">
    <h3>1. 设置密码</h3>
    <input type="password" id="pwd1" placeholder="输入新密码"><br>
    <input type="password" id="pwd2" placeholder="确认新密码"><br>
    <button onclick="setPwd()">设置密码</button>
    <p id="setResult"></p>
  </div>

  <div class="card">
    <h3>2. 验证密码</h3>
    <input type="password" id="pwdCheck" placeholder="输入密码"><br>
    <button onclick="checkPwd()">验证密码</button>
    <p id="checkResult"></p>
  </div>

  <div class="card">
    <h3>3. 当前状态</h3>
    <p id="status">检查中...</p>
    <button onclick="clearPwd()" class="danger">清除密码</button>
  </div>

  <script>
    function updateStatus() {
      var pwd = localStorage.getItem('fin_pwd');
      document.getElementById('status').innerHTML = 
        '密码状态: ' + (pwd ? '<b>已设置</b> (' + pwd.length + '位)' : '<b>未设置</b>') +
        '<br>localStorage.fin_pwd = ' + (pwd || '(空)');
    }

    function setPwd() {
      var p1 = document.getElementById('pwd1').value;
      var p2 = document.getElementById('pwd2').value;
      
      if (!p1 || p1.length < 4) {
        document.getElementById('setResult').innerHTML = '❌ 密码至少4位';
        return;
      }
      if (p1 !== p2) {
        document.getElementById('setResult').innerHTML = '❌ 两次密码不一致';
        return;
      }
      
      localStorage.setItem('fin_pwd', p1);
      document.getElementById('setResult').innerHTML = '✅ 密码设置成功！';
      document.getElementById('pwd1').value = '';
      document.getElementById('pwd2').value = '';
      updateStatus();
    }

    function checkPwd() {
      var input = document.getElementById('pwdCheck').value;
      var stored = localStorage.getItem('fin_pwd') || '';
      
      if (input === stored) {
        document.getElementById('checkResult').innerHTML = '✅ 密码正确！';
      } else {
        document.getElementById('checkResult').innerHTML = '❌ 密码错误！';
      }
      document.getElementById('pwdCheck').value = '';
    }

    function clearPwd() {
      if (confirm('确定清除密码？')) {
        localStorage.removeItem('fin_pwd');
        document.getElementById('setResult').innerHTML = '✅ 密码已清除';
        updateStatus();
      }
    }

    updateStatus();
  </script>
</body>
</html>
