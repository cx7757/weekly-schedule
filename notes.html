<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>📚 考公知识速记</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--text:#1a1a2e;--sub:#8395a7;--accent:#4a6cf7;--accent2:#6c8cff;--border:#e8ecf1;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:14px;}
.dark{--bg:#0f0f23;--card:#1a1a2e;--text:#e0e0e0;--sub:#8395a7;--accent:#6c8cff;--accent2:#8aa8ff;--border:#2d2d44;--shadow:0 2px 12px rgba(0,0,0,.3);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:12px 16px 80px;max-width:640px;margin:0 auto;transition:background .3s,color .3s;}

/* Header */
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 0;}
.back-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.back-btn:active{transform:scale(.92);background:var(--accent);color:#fff;border-color:var(--accent);}
.header-title{font-size:18px;font-weight:800;}
.header-right{margin-left:auto;display:flex;gap:6px;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:active{transform:scale(.92);}

/* Search */
.search-wrap{position:relative;margin-bottom:12px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);}
.search-input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;color:var(--text);background:var(--card);font-family:inherit;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--sub);}

/* Stats */
.stats-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px;flex-wrap:wrap;gap:4px;}
.stats-info{font-size:12px;color:var(--sub);}
.stats-total{font-weight:700;color:var(--accent);}
.stats-filter{font-size:12px;color:var(--accent);font-weight:600;}

/* Category tabs (大类) */
.cat-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.cat-tab:active{transform:scale(.95);}
.cat-tab.active{border-color:var(--accent);background:var(--accent);color:#fff;}

/* Sub-category tabs (小类) */
.sub-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.sub-tabs::-webkit-scrollbar{display:none;}
.sub-tab{padding:5px 12px;border-radius:16px;font-size:11px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.sub-tab:active{transform:scale(.95);}
.sub-tab.active{border-color:var(--accent2);background:var(--accent2);color:#fff;}

/* Breadcrumb */
.breadcrumb{font-size:12px;color:var(--sub);margin-bottom:10px;display:flex;align-items:center;gap:4px;}
.breadcrumb span.bc-active{color:var(--accent);font-weight:700;}

/* Section */
.section{margin-bottom:18px;}
.section-title{font-size:15px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--accent);color:var(--text);display:flex;align-items:center;gap:6px;}
.section-count{font-size:11px;color:var(--sub);font-weight:600;}

/* Item */
.item{padding:9px 12px;margin-bottom:6px;background:var(--card);border-radius:10px;font-size:13px;line-height:1.7;border-left:3px solid var(--accent);transition:all .15s;box-shadow:var(--shadow);}
.item:active{transform:scale(.98);}
.item-num{font-weight:700;color:var(--accent);margin-right:4px;font-size:11px;}
.item mark{background:#ffe066;color:#333;border-radius:2px;padding:0 2px;}
.dark .item mark{background:#4a3f00;color:#ffe066;}

/* Category colors */
.item[data-cat="政治"]{border-left-color:#e74c3c;}
.item[data-cat="经济"]{border-left-color:#f39c12;}
.item[data-cat="法律"]{border-left-color:#9b59b6;}
.item[data-cat="历史"]{border-left-color:#2ecc71;}
.item[data-cat="人文"]{border-left-color:#1abc9c;}
.item[data-cat="科技"]{border-left-color:#3498db;}
.item[data-cat="地理"]{border-left-color:#e67e22;}
.item[data-cat="申论"]{border-left-color:#e91e63;}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* Footer */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:8px 16px;text-align:center;font-size:11px;color:var(--sub);max-width:640px;margin:0 auto;z-index:5;}

/* Floating back */
.fab-back{position:fixed;bottom:50px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(74,108,247,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.fab-back:active{transform:scale(.9);}

/* Home view */
.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px;}
.home-card{padding:16px 12px;border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);cursor:pointer;transition:all .2s;text-align:center;border:2px solid transparent;}
.home-card:active{transform:scale(.96);}
.home-card:hover{border-color:var(--accent);}
.home-card-icon{font-size:28px;margin-bottom:6px;}
.home-card-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.home-card-count{font-size:11px;color:var(--sub);}
</style>
</head>

// 类别颜色映射
const CAT_COLORS = {"政治":"#e74c3c","经济":"#f39c12","法律":"#9b59b6","历史":"#2ecc71","人文":"#1abc9c","科技":"#3498db","地理":"#e67e22","申论":"#e91e63"};
const CAT_ICONS = {"政治":"🏛️","经济":"💰","法律":"⚖️","历史":"📜","人文":"🎨","科技":"🔬","地理":"🌏","申论":"📝"};

let currentCat = null; // null = 首页
let currentSub = null;
let isSearchMode = false;

// 计算总数
function getTotal() {
  let total = 0;
  for (const cat of Object.keys(DB)) {
    for (const sub of Object.keys(DB[cat])) {
      total += DB[cat][sub].length;
    }
  }
  return total;
}

function getCatTotal(cat) {
  let total = 0;
  for (const sub of Object.keys(DB[cat] || {})) {
    total += DB[cat][sub].length;
  }
  return total;
}

function getSubTotal(cat, sub) {
  return (DB[cat] && DB[cat][sub]) ? DB[cat][sub].length : 0;
}

// 首页视图
function goHome() {
  currentCat = null;
  currentSub = null;
  isSearchMode = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('pageTitle').textContent = '📚 考公知识速记';
  document.getElementById('fabBtn').style.display = 'none';
  renderHome();
}

function renderHome() {
  const cats = Object.keys(DB);
  document.getElementById('statsFilter').textContent = '';
  document.getElementById('navArea').innerHTML = '';
  
  let html = '<div class="home-grid">';
  for (const cat of cats) {
    const total = getCatTotal(cat);
    const color = CAT_COLORS[cat] || '#4a6cf7';
    const icon = CAT_ICONS[cat] || '📌';
    html += `<div class="home-card" onclick="openCat('${cat}')">
      <div class="home-card-icon">${icon}</div>
      <div class="home-card-name">${cat}</div>
      <div class="home-card-count">${total} 条</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

// 打开大类
function openCat(cat) {
  currentCat = cat;
  currentSub = null;
  isSearchMode = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('statsFilter').textContent = '';
  document.getElementById('pageTitle').textContent = `${CAT_ICONS[cat] || ''} ${cat}`;
  document.getElementById('fabBtn').style.display = 'flex';
  
  const subs = Object.keys(DB[cat]);
  if (subs.length === 0) {
    document.getElementById('navArea').innerHTML = `<div class="breadcrumb"><span onclick="goHome()" style="cursor:pointer">首页</span> › <span class="bc-active">${cat}</span></div>`;
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无数据，待补充</div>';
    return;
  }
  
  renderCatView(cat);
}

function renderCatView(cat) {
  const subs = Object.keys(DB[cat]);
  const total = getCatTotal(cat);
  const color = CAT_COLORS[cat] || '#4a6cf7';
  
  document.getElementById('navArea').innerHTML = `
    <div class="breadcrumb"><span onclick="goHome()" style="cursor:pointer">首页</span> › <span class="bc-active">${cat}</span></div>
    <div class="sub-tabs">
      ${subs.map(s => {
        const cnt = getSubTotal(cat, s);
        const isActive = (!currentSub && s === subs[0]) || currentSub === s;
        return `<div class="sub-tab ${isActive ? 'active' : ''}" onclick="selectSub('${cat}','${s}')">${s}(${cnt})</div>`;
      }).join('')}
    </div>`;
  
  // If no specific sub selected, show first one
  if (!currentSub || !DB[cat][currentSub]) {
    currentSub = subs[0];
  }
  renderSubContent(cat, currentSub);
}

function selectSub(cat, sub) {
  currentSub = sub;
  // Update tab active state
  const tabs = document.querySelectorAll('.sub-tab');
  tabs.forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderSubContent(cat, sub);
}

function renderSubContent(cat, sub) {
  const items = DB[cat][sub] || [];
  if (items.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>该分类暂无数据，待补充</div>';
    return;
  }
  
  let html = `<div class="section"><div class="section-title" style="border-color:${CAT_COLORS[cat]}">📖 ${sub} <span class="section-count">${items.length}条</span></div>`;
  for (let i = 0; i < items.length; i++) {
    html += `<div class="item" data-cat="${cat}"><span class="item-num">${i+1}.</span>${items[i].t}</div>`;
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

// 搜索功能
function onSearch() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  
  if (!q) {
    if (currentCat) {
      openCat(currentCat);
    } else {
      goHome();
    }
    return;
  }
  
  isSearchMode = true;
  document.getElementById('statsFilter').textContent = '';
  document.getElementById('navArea').innerHTML = '';
  document.getElementById('pageTitle').textContent = '🔍 搜索结果';
  
  let totalMatches = 0;
  let html = '';
  
  const cats = Object.keys(DB);
  for (const cat of cats) {
    const subs = Object.keys(DB[cat]);
    for (const sub of subs) {
      const items = DB[cat][sub].filter(it => it.t.toLowerCase().includes(q));
      if (items.length === 0) continue;
      totalMatches += items.length;
      
      html += `<div class="section"><div class="section-title" style="border-color:${CAT_COLORS[cat]}">${CAT_ICONS[cat]} ${cat} › ${sub} <span class="section-count">匹配${items.length}条</span></div>`;
      for (let i = 0; i < items.length; i++) {
        let text = items[i].t;
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
        text = text.replace(re, '<mark>$1</mark>');
        html += `<div class="item" data-cat="${cat}"><span class="item-num">${i+1}.</span>${text}</div>`;
      }
      html += '</div>';
    }
  }
  
  if (!html) {
    html = '<div class="empty"><div class="empty-icon">🔍</div>没有匹配的知识点</div>';
  }
  
  document.getElementById('statsFilter').textContent = `找到 ${totalMatches} 条`;
  document.getElementById('content').innerHTML = html;
}

// 暗色模式
function initTheme() {
  const d = localStorage.getItem('theme');
  if (d === 'dark' || (!d && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
}
function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

// 初始化
document.getElementById('statsTotal').textContent = getTotal();
initTheme();
goHome();
</script>
