<!DOCTYPE html>

<head>

<title>📚 考公资料速记</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--text:#1a1a2e;--sub:#8395a7;--accent:#4a6cf7;--border:#e8ecf1;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:14px;}
.dark{--bg:#0f0f23;--card:#1a1a2e;--text:#e0e0e0;--sub:#8395a7;--accent:#6c8cff;--border:#2d2d44;--shadow:0 2px 12px rgba(0,0,0,.3);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:12px 16px 80px;max-width:600px;margin:0 auto;transition:background .3s,color .3s;}

/* Header */
.header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 0;}
.back-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.back-btn:active{transform:scale(.92);background:var(--accent);color:#fff;border-color:var(--accent);}
.header-title{font-size:18px;font-weight:800;}
.header-right{margin-left:auto;}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.theme-btn:active{transform:scale(.92);}

/* Search */
.search-wrap{position:relative;margin-bottom:14px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);}
.search-input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;color:var(--text);background:var(--card);font-family:inherit;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--sub);}

/* Stats */
.stats-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px;}
.stats-info{font-size:12px;color:var(--sub);}
.stats-total{font-weight:700;color:var(--accent);}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab:active{transform:scale(.95);}
.tab.active{border-color:var(--accent);background:var(--accent);color:#fff;}

/* Section */
.section{margin-bottom:20px;}
.section-title{font-size:16px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--accent);color:var(--text);display:flex;align-items:center;gap:6px;}

/* Item */
.item{padding:10px 12px;margin-bottom:8px;background:var(--card);border-radius:12px;font-size:13px;line-height:1.7;border-left:3px solid var(--accent);transition:all .15s;box-shadow:var(--shadow);}
.item:active{transform:scale(.98);}
.item-num{font-weight:700;color:var(--accent);margin-right:4px;font-size:12px;}
.item mark{background:#ffe066;color:#333;border-radius:2px;padding:0 2px;}
.dark .item mark{background:#4a3f00;color:#ffe066;}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* Footer */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;text-align:center;font-size:11px;color:var(--sub);max-width:600px;margin:0 auto;}

/* Floating back */
.fab-back{position:fixed;bottom:50px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(74,108,247,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.fab-back:active{transform:scale(.9);}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()" title="返回">←</button>

<div id="content"></div>

let activeCat="时政热点";
let isSearchAll=false;

// 计算总数
function getTotal(){
  return Object.values(DB).reduce((s,a)=>s+a.length,0);
}

// 渲染标签页
function renderTabs(){
  const cats=Object.keys(DB);
  const total=getTotal();
  document.getElementById("tabs").innerHTML=
    `<div class="tab ${isSearchAll?'active':''}" onclick="isSearchAll=true;renderTabs();render()">全部(${total})</div>`+
    cats.map(c=>
      `<div class="tab ${!isSearchAll&&c===activeCat?'active':''}" onclick="isSearchAll=false;activeCat='${c}';renderTabs();render()">${c}(${DB[c].length})</div>`
    ).join('');
}

// 渲染内容
function render(){
  const q=(document.getElementById("searchInput").value||"").trim().toLowerCase();
  document.getElementById("statsTotal").textContent=getTotal();

  let cats=isSearchAll?Object.keys(DB):[activeCat];
  let html="";

  for(const cat of cats){
    const items=DB[cat]||[];
    let filtered=items;
    if(q){
      filtered=items.filter(it=>it.t.toLowerCase().includes(q));
    }
    if(filtered.length===0) continue;

    document.getElementById("statsFilter").textContent=q?`找到 ${filtered.length} 条`:'';

    html+=`<div class="section"><div class="section-title">📖 ${cat}</div>`;
    for(let i=0;i<filtered.length;i++){
      let text=filtered[i].t;
      if(q){
        const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
        text=text.replace(re,'<mark>$1</mark>');
      }
      html+=`<div class="item"><span class="item-num">${i+1}.</span>${text}</div>`;
    }
    html+=`</div>`;
  }

  if(!html){
    html=`<div class="empty"><div class="empty-icon">🔍</div>没有匹配的知识点</div>`;
  }

  document.getElementById("content").innerHTML=html;
}

// 暗色模式
function initTheme(){
  const d=localStorage.getItem('theme');
  if(d==='dark'||(!d&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.documentElement.classList.add('dark');
    document.getElementById("themeBtn").textContent='☀️';
  }
}
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  const isDark=document.documentElement.classList.contains('dark');
  document.getElementById("themeBtn").textContent=isDark?'☀️':'🌙';
  localStorage.setItem('theme',isDark?'dark':'light');
}

// 初始化
initTheme();
renderTabs();
render();
</script>
